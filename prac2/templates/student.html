<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body> 
    {% if messages %}
        {% for message in messages %}
            <p style="color: green;">{{ message }}</p>
        {% endfor %}
    {% endif %}


    <form method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit">save</button>
    </form>
   <a href="{% url 'student_list' %}" class="btn">View Students</a>
    
</body>
</html>
